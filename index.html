<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <title>Frontend Mentor | Article preview component</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main>
    <div class="image-container">
      <img class="picture" src="./images/drawers.jpg" alt="photo of a green desk with flower on the top">
    </div>
    <div class="container">
      <section>
        <h1 class="text1">Shift the overall look and feel by adding these wonderful 
        touches to furniture in your home</h1>
        <p>Ever been in a room and felt like something was missing? Perhaps 
        it felt slightly bare and uninviting. I’ve got some simple tips 
        to help you make any room feel complete.
        </p>
      </section>
      <div class="horizontal">
        <img class="avatar" src="./images/avatar-michelle.jpg" alt="photo of michelle, the autor">
        <h2>Michelle Appleton</h2>
        <p>28 Jun 2020</p>
        <button id="btnShare"><img src="./images/icon-share.svg" alt="Share"></button>
      </div>
    </div>
  </main>
</body>
<script src="script.js"></script>
</html>
